<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ኢትዮ ስራ ፈላጊ</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f8ff; text-align: center; padding: 20px; margin: 0; }
        .header { background: #0088cc; color: white; padding: 20px; border-radius: 0 0 20px 20px; margin-bottom: 20px; }
        .job-card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; text-align: left; border-left: 5px solid #0088cc; }
        h2 { margin-top: 0; color: #333; }
        .apply-btn { background-color: #0088cc; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <h1>ኢትዮ ስራ ፈላጊ 🇪🇹</h1>
        <p>የዛሬ አዳዲስ ስራዎች</p>
    </div>

    <div class="job-card">
        <h2>የሂሳብ ባለሙያ</h2>
        <p><b>ድርጅት:</b> አቢሲኒያ ባንክ</p>
        <p><b>ደመወዝ:</b> 18,500 ብር</p>
        <button class="apply-btn" onclick="alert('ማመልከቻዎ በሚገባ ተልኳል!')">አሁኑኑ ያመልክቱ</button>
    </div>

    <div class="job-card">
        <h2>የሽያጭ ሰራተኛ</h2>
        <p><b>ድርጅት:</b> ኖህ ሪል እስቴት</p>
        <p><b>ደመወዝ:</b> በኮሚሽን + 6,000</p>
        <button class="apply-btn" onclick="alert('ማመልከቻዎ በሚገባ ተልኳል!')">አሁኑኑ ያመልክቱ</button>
    </div>
</body>
</html>
