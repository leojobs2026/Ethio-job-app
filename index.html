<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethio Job Pro v4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    </head>
<body class="bg-[#0f172a] text-white font-sans">

    <div id="mainApp" class="max-w-md mx-auto min-h-screen pb-24">
        <div class="bg-slate-800/80 backdrop-blur-md sticky top-0 z-10 p-6 border-b border-slate-700 text-center">
            <p class="text-gray-400 text-xs uppercase font-bold">ያጠራቀሙት ሒሳብ</p>
            <h1 id="balance" class="text-5xl font-black text-green-500 mt-1">$0.000</h1>
        </div>

        <div id="contentArea" class="px-5 py-6"></div>

        <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-slate-900 border-t border-slate-800 flex justify-around p-3">
            <button onclick="navigate('home')" class="flex flex-col items-center gap-1 text-gray-400 hover:text-green-500">
                <i class="fas fa-home text-xl"></i><span class="text-[10px]">መነሻ</span>
            </button>
            <button onclick="navigate('task')" class="flex flex-col items-center gap-1 text-gray-400 hover:text-green-500">
                <i class="fas fa-tasks text-xl"></i><span class="text-[10px]">ስራዎች</span>
            </button>
            <button onclick="navigate('game')" class="flex flex-col items-center gap-1 text-gray-400 hover:text-green-500">
                <i class="fas fa-gamepad text-xl"></i><span class="text-[10px]">ጨዋታ</span>
            </button>
            <button onclick="navigate('wallet')" class="flex flex-col items-center gap-1 text-gray-400 hover:text-green-500">
                <i class="fas fa-wallet text-xl"></i><span class="text-[10px]">Wallet</span>
            </button>
        </nav>
    </div>

    <script>
        let balance = parseFloat(localStorage.getItem('ethio_balance')) || 0.00;

        function updateUI() {
            document.getElementById('balance').innerText = `$${balance.toFixed(3)}`;
            localStorage.setItem('ethio_balance', balance);
        }

        function navigate(page) {
            const content = document.getElementById('contentArea');
            if(page === 'home') {
                content.innerHTML = `<h2 class="text-xl font-bold">እንኳን ደህና መጡ!</h2><p class="text-gray-400 mt-2 text-sm">ስራዎችን በመስራት እና ጓደኛ በመጋበዝ ገንዘብ ያግኙ።</p>`;
            } else if(page === 'task') {
                content.innerHTML = `
                    <h2 class="text-lg font-bold mb-4">የዛሬ ስራዎች</h2>
                    <div class="space-y-4">
                        ${renderTask("ዩቲዩብ ቪዲዮ ማየት", 0.005, "youtube")}
                        ${renderTask("ቲክቶክ ቪዲዮ ማየት", 0.005, "tiktok")}
                    </div>`;
            } else if(page === 'game') {
                content.innerHTML = `<h2 class="text-lg font-bold">ጨዋታዎች</h2><p class="text-sm text-gray-400 mt-4 text-center">በቅርቡ ይጠብቁ...</p>`;
            } else if(page === 'wallet') {
                content.innerHTML = `
                    <h2 class="text-lg font-bold mb-4">ገንዘብ ማውጫ</h2>
                    <div class="bg-slate-800 p-5 rounded-2xl border border-slate-700 space-y-4">
                        <select class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 text-sm">
                            <option>Telebirr</option><option>CBE</option><option>Abyssinia</option>
                        </select>
                        <input type="tel" placeholder="የስልክ ቁጥር" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700">
                        <button onclick="checkWithdraw()" class="w-full bg-green-600 py-4 rounded-xl font-bold">ክፍያ ይጠይቁ</button>
                    </div>`;
            }
            updateUI();
        }

        function renderTask(title, pay, icon) {
            return `<div class="bg-slate-800 p-4 rounded-2xl flex justify-between items-center border border-slate-700" onclick="showAd(${pay})">
                <div class="flex items-center gap-3">
                    <i class="fab fa-${icon} text-2xl text-red-500"></i>
                    <div><p class="font-bold text-sm">${title}</p><p class="text-green-500 text-xs">+$${pay}</p></div>
                </div>
                <button class="bg-green-600 px-4 py-1 rounded-lg text-xs font-bold">ስራ</button>
            </div>`;
        }

        function showAd(amount) {
            // --- AdMob ማስታወቂያ እዚህ ጋር ነው የሚቀሰቀሰው ---
            alert("ማስታወቂያውን አይተው ሲጨርሱ ክፍያ ይገባል!");
            balance += amount;
            updateUI();
        }

        function checkWithdraw() {
            if(balance < 0.50) alert("ዝቅተኛ የማውጫ መጠን $0.50 ነው!");
            else alert("ጥያቄዎ ተልኳል!");
        }

        navigate('home');
    </script>
</body>
</html>
