<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethio Job Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #0088cc; --dark: #1a1a1a; --success: #27ae60; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        .top-nav { background: var(--dark); color: white; padding: 25px 20px; text-align: center; border-radius: 0 0 25px 25px; }
        .balance-card { background: white; margin: -25px 20px 15px; padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .balance-amount { font-size: 2.5em; font-weight: 800; color: var(--primary); }
        .page { display: none; padding: 15px; }
        .page.active { display: block; }
        .task-card { background: white; padding: 18px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid var(--primary); }
        .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #eee; }
        .nav-item { border: none; background: none; color: #95a5a6; display: flex; flex-direction: column; align-items: center; flex: 1; font-size: 0.8em; }
        .nav-item.active { color: var(--primary); font-weight: bold; }
        input, select { width: 92%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 12px; }
    </style>
</head>
<body>

    <div class="top-nav"><h3>ETHIO JOB PRO</h3></div>
    <div class="balance-card">
        <div style="color: #666;">ጠቅላላ የሥራ ገቢ</div>
        <div class="balance-amount"><span id="main-bal">0.00</span> ETB</div>
    </div>

    <div id="home" class="page active"><div id="home-tasks"></div></div>
    <div id="tasks" class="page"><div id="all-tasks"></div></div>
    
    <div id="withdraw" class="page">
        <div style="background: white; padding: 20px; border-radius: 20px;">
            <h3>ብር ማውጫ (Withdraw)</h3>
            <select id="method"><option>Telebirr</option><option>CBE</option></select>
            <input type="number" id="acc" placeholder="ቁጥር ያስገቡ">
            <input type="text" id="name" placeholder="ሙሉ ስም ያስገቡ">
            <button class="btn" style="width:100%; padding:15px; background:var(--success);" onclick="submitWithdraw()">ጥያቄ ላክ</button>
        </div>
    </div>

    <div id="profile" class="page">
        <div style="background: white; padding: 25px; border-radius: 20px; text-align: center;">
            <div style="font-size: 4em;">👤</div>
            <h3>የእኔ መለያ</h3>
            <p>የተጠቃሚ ስም: @Leohaftu1</p>
            <hr style="border: 0.5px solid #eee; margin: 20px 0;">
            <h3 style="color: #0088cc;">ማስታወቂያ ማሰራት ይፈልጋሉ?</h3>
            <p style="font-size: 0.9em; color: #666;">ቻናልዎን ወይም ቪዲዮዎን ማስተዋወቅ ከፈለጉ ያነጋግሩን።</p>
            <a href="https://t.me/Leohaftu1" target="_blank" style="background: #0088cc; color: white; text-decoration: none; display: block; padding: 15px; border-radius: 12px; font-weight: bold; margin-top: 15px;">ለማስታወቂያ ያነጋግሩኝ</a>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" onclick="showPage('home', this)">🏠<br>Home</button>
        <button class="nav-item" onclick="showPage('tasks', this)">📋<br>Tasks</button>
        <button class="nav-item" onclick="showPage('withdraw', this)">💸<br>Withdraw</button>
        <button class="nav-item" onclick="showPage('profile', this)">👤<br>Profile</button>
    </div>

<script>
    let balance = 0.00;
    const botToken = "8638798872:AAGaKoLv9VSRRK3nI7UPx8iJc6byQ5L3tBc";
    const chatId = "7821771120";

    const tasksData = [
        {t: "ቴሌግራም መቀላቀል", r: 5, link: "https://t.me/EthioJobFinder"}, 
        {t: "ዩቲዩብ ሰብስክራይብ", r: 10, link: "https://youtube.com"},
        {t: "ቲክቶክ ፎሎው", r: 4, link: "https://tiktok.com"},
        {t: "ድረ-ገጽ መጎብኘት", r: 3, link: "https://google.com"}
    ];

    function startTask(url, amt, btn) {
        window.open(url, "_blank");
        btn.innerText = "በማረጋገጥ ላይ...";
        setTimeout(() => {
            balance += amt;
            document.getElementById('main-bal').innerText = balance.toFixed(2);
            btn.disabled = true;
            btn.innerText = "ተጠናቀቀ ✔️";
            btn.style.background = "#ccc";
        }, 3000); 
    }

    function showPage(pageId, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        btn.classList.add('active');
    }

    function submitWithdraw() {
        const acc = document.getElementById('acc').value;
        const name = document.getElementById('name').value;
        if(acc && name) {
            const msg = `🚨 አዲስ ጥያቄ!\nዘዴ: ${document.getElementById('method').value}\nቁጥር: ${acc}\nስም: ${name}\nመጠን: ${balance.toFixed(2)} ETB`;
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}`);
            alert("ጥያቄዎ ተልኳል!");
            balance = 0;
            document.getElementById('main-bal').innerText = "0.00";
        }
    }

    tasksData.forEach((task, index) => {
        const html = `<div class="task-card"><div><h4>${task.t}</h4><span>+${task.r} ETB</span></div><button class="btn" onclick="startTask('${task.link}', ${task.r}, this)">ስራ</button></div>`;
        document.getElementById('all-tasks').innerHTML += html;
        if(index < 4) document.getElementById('home-tasks').innerHTML += html;
    });
</script>
</body>
</html>
