<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethio Job Finder - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .card { background: #1e293b; border-radius: 12px; padding: 15px; margin-bottom: 10px; border: 1px solid #334155; }
        .coin-text { color: #eab308; font-weight: bold; }
    </style>
</head>
<body>

    <div class="p-6 text-center sticky top-0 bg-[#0f172a] z-10 border-b border-gray-800">
        <p class="text-gray-400 text-xs">ጠቅላላ የያዙት ኮይን</p>
        <h1 id="userCoins" class="text-4xl font-black text-yellow-500">50</h1>
        <p class="text-[10px] text-green-500 mt-1">ID: 0993053753</p>
    </div>

    <div id="ad-container" class="w-full bg-gray-900 py-2 flex justify-center border-b border-gray-800">
        <p class="text-[10px] text-gray-500 italic">የAdMob ማስታወቂያ እዚህ ይጫናል</p>
    </div>

    <div id="main-content" class="p-4 pb-24">
        </div>

    <div class="fixed bottom-0 w-full bg-[#1e293b] flex justify-around p-3 border-t border-gray-700">
        <button onclick="showPage('home')" class="text-center text-gray-400 hover:text-green-500">
            <i class="fas fa-home"></i><br><span class="text-[10px]">ቤት</span>
        </button>
        <button onclick="showPage('games')" class="text-center text-gray-400 hover:text-green-500">
            <i class="fas fa-gamepad"></i><br><span class="text-[10px]">ጌሞች</span>
        </button>
        <button onclick="showPage('withdraw')" class="text-center text-gray-400 hover:text-green-500">
            <i class="fas fa-wallet"></i><br><span class="text-[10px]">መውጫ</span>
        </button>
    </div>

    <script>
        let coins = 50;

        function updateDisplay() {
            document.getElementById('userCoins').innerText = coins;
        }

        function showPage(page) {
            const content = document.getElementById('main-content');
            if(page === 'home') {
                content.innerHTML = `
                    <h2 class="text-lg font-bold mb-4">የዛሬ ስራዎች</h2>
                    <div class="card flex justify-between items-center">
                        <div><p>ቪዲዮ አይተው ኮይን ያግኙ</p><p class="coin-text">+10 Coins</p></div>
                        <button onclick="watchVideo()" class="bg-green-600 px-4 py-2 rounded text-sm font-bold">ስራ</button>
                    </div>
                `;
            } else if(page === 'games') {
                content.innerHTML = `
                    <h2 class="text-lg font-bold mb-4">ዕድልዎን ይሞክሩ (Win/Loss)</h2>
                    <div class="card flex justify-between items-center border-l-4 border-purple-500">
                        <div><p>Lucky Spin</p><p class="text-xs text-gray-400">መጫወቻ: 20 ኮይን</p></div>
                        <button onclick="playGame(20, 'Lucky Spin')" class="bg-purple-600 px-4 py-2 rounded text-sm font-bold">ተጫወት</button>
                    </div>
                    <div class="card flex justify-between items-center border-l-4 border-red-500">
                        <div><p>777 Slots</p><p class="text-xs text-gray-400">መጫወቻ: 50 ኮይን</p></div>
                        <button onclick="playGame(50, '777 Slots')" class="bg-red-600 px-4 py-2 rounded text-sm font-bold">ተጫወት</button>
                    </div>
                `;
            } else if(page === 'withdraw') {
                content.innerHTML = `
                    <div class="card">
                        <h2 class="text-lg font-bold mb-4">ገንዘብ ማውጫ</h2>
                        <input type="text" placeholder="Telebirr Number" class="w-full p-3 bg-gray-800 rounded mb-4 outline-none">
                        <button onclick="alert('ቢያንስ 500 ኮይን ያስፈልጋል')" class="w-full bg-green-600 p-3 rounded font-bold">REQUEST WITHDRAW</button>
                    </div>
                `;
            }
        }

        function watchVideo() {
            alert("ማስታወቂያ በመጫን ላይ...");
            // እውነተኛው የAdMob ቪዲዮ እዚህ ነው የሚጠራው
            setTimeout(() => {
                coins += 10;
                updateDisplay();
                alert("እንኳን ደስ አለዎት! 10 ኮይን አግኝተዋል");
            }, 3000);
        }

        function playGame(cost, name) {
            if(coins >= cost) {
                coins -= cost;
                updateDisplay();
                // የዕድል ስሌት (50/50 ዕድል)
                if(Math.random() > 0.7) {
                    let win = cost * 2;
                    coins += win;
                    alert("አሸነፉ! " + win + " ኮይን ተጨመረልዎት!");
                } else {
                    alert("አልተሳካም! እንደገና ይሞክሩ።");
                }
                updateDisplay();
            } else {
                alert("በቂ ኮይን የለዎትም!");
            }
        }

        showPage('home');
    </script>
</body>
</html>
