<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethio Job Pro $</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#0f172a] text-white font-sans">

    <div id="loginPage" class="flex flex-col items-center justify-center min-h-screen p-6">
        <div class="bg-[#1e293b] p-8 rounded-2xl shadow-2xl w-full max-w-md border border-gray-700 text-center">
            <h1 class="text-3xl font-bold mb-2 text-green-500 underline">ETHIO JOB PRO $</h1>
            <p class="text-gray-400 mb-6">ለመቀጠል መጀመሪያ ይግቡ</p>
            <input type="text" placeholder="ኢሜል ወይም ስልክ ቁጥር" class="w-full p-4 mb-4 rounded-xl bg-gray-900 border border-gray-700 focus:border-green-500 outline-none">
            <input type="password" placeholder="የይለፍ ቃል" class="w-full p-4 mb-6 rounded-xl bg-gray-900 border border-gray-700 focus:border-green-500 outline-none">
            <button onclick="showPage('homePage')" class="w-full bg-green-600 hover:bg-green-700 p-4 rounded-xl font-bold text-xl transition shadow-lg">ግባ / Login</button>
        </div>
    </div>

    <div id="homePage" class="hidden pb-24">
        <div class="bg-white m-4 p-8 rounded-3xl text-center shadow-2xl">
            <p class="text-gray-500 font-medium">የእርስዎ የዶላር ገቢ</p>
            <h1 class="text-6xl font-black text-green-600">$0.00</h1>
            <p class="text-xs text-gray-400 mt-2">በምንዛሬ በቴሌብር ይከፈልዎታል</p>
        </div>

        <div class="px-6">
            <h2 class="text-xl font-bold mb-4 flex items-center"><i class="fas fa-fire text-orange-500 mr-2"></i> የዛሬ ምርጥ ስራዎች</h2>
            
            <div class="space-y-4">
                <div class="bg-[#1e293b] p-5 rounded-2xl flex justify-between items-center border border-gray-700">
                    <div><p class="font-medium">አዲስ ምርጥ የሙዚቃ ቪዲዮ</p><p class="text-green-400 font-bold">+$0.02</p></div>
                    <button class="bg-green-600 px-6 py-2 rounded-lg font-bold">ስራ</button>
                </div>
                <div class="bg-[#1e293b] p-5 rounded-2xl flex justify-between items-center border border-gray-700">
                    <div><p class="font-medium">አስቂኝ የቲክቶክ ቪዲዮዎች</p><p class="text-green-400 font-bold">+$0.02</p></div>
                    <button class="bg-green-600 px-6 py-2 rounded-lg font-bold">ስራ</button>
                </div>
                <div class="bg-[#1e293b] p-5 rounded-2xl flex justify-between items-center border border-gray-700">
                    <div><p class="font-medium">የሳምንቱ ምርጥ ፊልም ትሬለር</p><p class="text-green-400 font-bold">+$0.03</p></div>
                    <button class="bg-green-600 px-6 py-2 rounded-lg font-bold">ስራ</button>
                </div>
                <div class="bg-[#1e293b] p-5 rounded-2xl flex justify-between items-center border border-gray-700">
                    <div><p class="font-medium">የቴክኖሎጂ መረጃዎች</p><p class="text-green-400 font-bold">+$0.02</p></div>
                    <button class="bg-green-600 px-6 py-2 rounded-lg font-bold">ስራ</button>
                </div>
                <div class="bg-blue-900/30 p-5 rounded-2xl flex justify-between items-center border border-blue-500">
                    <div><p class="font-medium">ጓደኛ ይጋብዙ (Referral)</p><p class="text-blue-400 font-bold">+$0.10</p></div>
                    <button class="bg-blue-600 px-6 py-2 rounded-lg font-bold">ጋብዝ</button>
                </div>
            </div>
        </div>
    </div>

    <div id="withdrawPage" class="hidden p-6 text-center">
        <h2 class="text-2xl font-bold mb-6 text-green-500">ገንዘብ ማውጫ (Withdraw)</h2>
        <div class="bg-[#1e293b] p-6 rounded-2xl border border-gray-700 mb-6">
            <p class="text-red-400 mb-4 font-bold text-lg underline">ዝቅተኛው የክፍያ መጠን $0.50 ነው።</p>
            <select class="w-full p-4 mb-4 rounded-xl bg-gray-900 border border-gray-700 outline-none">
                <option>Telebirr (ቴሌብር)</option>
                <option>CBE (የኢትዮጵያ ንግድ ባንክ)</option>
                <option>PayPal (Global)</option>
                <option>USDT (Crypto)</option>
            </select>
            <input type="text" placeholder="የአካውንት ቁጥር ወይም ስልክ" class="w-full p-4 mb-4 rounded-xl bg-gray-900 border border-gray-700">
            <input type="text" placeholder="ሙሉ ስም" class="w-full p-4 mb-6 rounded-xl bg-gray-900 border border-gray-700">
            <button class="w-full bg-green-600 p-4 rounded-xl font-bold">ክፍያ ይጠይቁ</button>
        </div>
    </div>

    <div id="navBar" class="hidden fixed bottom-0 w-full bg-[#1e293b] border-t border-gray-700 flex justify-around p-4 text-gray-400">
        <button onclick="showPage('homePage')" class="focus:text-green-500 flex flex-col items-center"><i class="fas fa-home mb-1"></i><span class="text-xs">Home</span></button>
        <button onclick="showPage('withdrawPage')" class="focus:text-green-500 flex flex-col items-center"><i class="fas fa-wallet mb-1"></i><span class="text-xs">Withdraw</span></button>
        <button class="flex flex-col items-center"><i class="fas fa-user mb-1"></i><span class="text-xs">Profile</span></button>
    </div>

    <script>
        function showPage(pageId) {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('homePage').classList.add('hidden');
            document.getElementById('withdrawPage').classList.add('hidden');
            document.getElementById('navBar').classList.remove('hidden');
            
            document.getElementById(pageId).classList.remove('hidden');
        }
    </script>
</body>
</html>
