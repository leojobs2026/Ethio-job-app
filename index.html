<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethio-Job Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; margin: 0; }
        .container { padding: 20px; }
        #auth-page { padding: 50px 20px; }
        input { width: 80%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
        .btn { background: #3b82f6; color: white; border: none; padding: 12px 20px; border-radius: 8px; width: 85%; font-weight: bold; }
        #wheel { width: 250px; height: 250px; border-radius: 50%; border: 5px solid white; transition: transform 4s cubic-bezier(0.1, 0.7, 0.1, 1); background: conic-gradient(#3b82f6 0 45deg, #ef4444 45deg 90deg, #10b981 90deg 135deg, #f59e0b 135deg 180deg, #3b82f6 180deg 225deg, #ef4444 225deg 270deg, #10b981 270deg 315deg, #f59e0b 315deg 360deg); margin: 20px auto; }
    </style>
</head>
<body>
    <div id="auth-page">
        <h2>Ethio-Job Finder</h2>
        <input type="text" id="contact" placeholder="Phone/Email">
        <button class="btn" onclick="sendOTP()">Send Code</button>
        <div id="otp-section" style="display:none;">
            <input type="text" id="otp-val" placeholder="Enter Code">
            <button class="btn" style="background:#10b981" onclick="verify()">Verify</button>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <h1 id="pts">0 PTS</h1>
        <div id="wheel"></div>
        <button class="btn" onclick="spin()">SPIN NOW</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let score = 0; let rot = 0;
        function sendOTP() {
            tg.sendData("get_code:" + document.getElementById('contact').value);
            document.getElementById('otp-section').style.display = 'block';
            alert("ኮድ በቦቱ በኩል ተልኳል!");
        }
        function verify() {
            if(document.getElementById('otp-val').value === "1234") {
                document.getElementById('auth-page').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
            } else { alert("ስህተት!"); }
        }
        function spin() {
            rot += Math.floor(Math.random() * 360) + 1800;
            document.getElementById('wheel').style.transform = `rotate(${rot}deg)`;
            setTimeout(() => { 
                score += Math.floor(Math.random() * 500);
                document.getElementById('pts').innerText = score + " PTS";
            }, 4000);
        }
    </script>
</body>
</html>
