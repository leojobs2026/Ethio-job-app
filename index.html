<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethio Mega Earn - ብር ይስሩ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 15px; color: #333; }
        .header { background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; padding: 25px; border-radius: 20px; text-align: center; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .balance-box { background: rgba(255,255,255,0.2); padding: 15px; border-radius: 12px; display: inline-block; margin-top: 10px; font-size: 1.5em; font-weight: bold; border: 1px solid rgba(255,255,255,0.3); }
        .section-title { text-align: left; font-size: 1.1em; font-weight: bold; margin: 20px 5px 10px; color: #1e3c72; }
        .card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border-left: 6px solid #1e3c72; }
        .card-info { text-align: left; flex-grow: 1; }
        .reward { color: #28a745; font-weight: bold; font-size: 1em; }
        .btn { background: #0088cc; color: white; border: none; padding: 12px 18px; border-radius: 10px; cursor: pointer; text-decoration: none; font-size: 0.9em; font-weight: bold; }
        .btn-withdraw { background: #28a745; width: 100%; margin-top: 10px; padding: 15px; font-size: 1.1em; }
        .btn-post { background: #9b59b6; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Ethio Mega Earn 🇪🇹</h2>
        <p>የ 15 ብር ስጦታዎ ገቢ ሆኗል!</p>
        <div class="balance-box">💰 ሂሳብ: <span id="balance">15.00</span> ETB</div>
    </div>

    <div class="section-title">ገቢ ያግኙ</div>

    <div class="card" style="border-left-color: #f39c12;">
        <div class="card-info">
            <h4>👥 ጓደኛ መጋበዝ</h4>
            <p>ለአንድ ሰው 10 ብር ያግኙ</p>
            <div class="reward">+10.00 ETB</div>
        </div>
        <button class="btn" onclick="alert('የመጋበዣ ሊንክዎ ተገልብጧል!')">ጋብዝ</button>
    </div>

    <div class="card" style="border-left-color: #9b59b6;">
        <div class="card-info">
            <h4>🎬 ቪዲዮ ይፖስቱ</h4>
            <p>ቪዲዮ ሲያጋሩ ብዙ ገቢ ያግኙ</p>
            <div class="reward">+20.00 ETB</div>
        </div>
        <button class="btn btn-post" onclick="alert('ቪዲዮ ለመፖሰት መጀመሪያ 150 ብር ይድረሱ!')">ፖስት</button>
    </div>

    <div class="card" style="border-left-color: #e74c3c;">
        <div class="card-info">
            <h4>📺 ቪዲዮ ማየት</h4>
            <p>ቪዲዮ አይተው ብር ይሰብስቡ</p>
            <div class="reward">+3.00 ETB</div>
        </div>
        <a href="https://youtube.com" target="_blank" class="btn" style="background: #e74c3c;">እይ</a>
    </div>

    <div style="margin-top: 25px; padding: 10px;">
        <button class="btn btn-withdraw" onclick="checkWithdraw()">💸 ብር አውጣ (Withdraw)</button>
        <p style="font-size: 0.8em; color: #666; margin-top: 10px;">* ዝቅተኛው የማውጫ መጠን 150.00 ETB ነው።</p>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function checkWithdraw() {
            let currentBalance = parseFloat(document.getElementById('balance').innerText);
            if (currentBalance < 150) {
                alert("ይቅርታ! ገንዘብ ለማውጣት ቢያንስ 150 ብር ሊኖርዎት ይገባል። አሁን ያለዎት: " + currentBalance + " ብር ነው።");
            } else {
                alert("ጥያቄዎ ተልኳል! በ 24 ሰዓት ውስጥ በቴሌግራም እንገናኛለን።");
            }
        }
    </script>
</body>
</html>
