<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethio Job Finder v12 - Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .done-task { opacity: 0.5; pointer-events: none; background: #1a2233 !important; border-color: #2d3748 !important; }
        .active-nav { color: #22c55e !important; background: rgba(34, 197, 94, 0.1); border-radius: 12px; }
    </style>
</head>
<body class="bg-[#0b0f1a] text-white font-sans">

    <div id="loginPage" class="flex flex-col items-center justify-center min-h-screen p-6">
        <div class="w-full max-w-sm bg-[#161e2d] p-10 rounded-[2.5rem] border border-slate-700 text-center shadow-2xl">
            <h2 class="text-2xl font-black mb-6 italic text-green-500">ETHIO JOB LOGIN</h2>
            <input id="userPhone" type="tel" placeholder="Phone Number (09...)" class="w-full p-4 rounded-2xl bg-[#0b0f1a] border border-slate-700 mb-4 text-center outline-none">
            <button onclick="login()" class="w-full bg-green-600 py-4 rounded-2xl font-black shadow-lg hover:bg-green-500">GET STARTED</button>
        </div>
    </div>

    <div id="mainApp" class="hidden max-w-md mx-auto min-h-screen pb-32">
        <div class="bg-[#161e2d] p-6 border-b border-slate-800 flex justify-between items-center sticky top-0 z-50">
            <div>
                <p id="idLabel" class="text-[10px] text-green-500 font-bold uppercase"></p>
                <h1 id="balDisplay" class="text-4xl font-black text-white">$0.000</h1>
            </div>
            <a href="https://t.me/Leohafru1" class="w-12 h-12 bg-blue-500/10 text-blue-500 rounded-xl flex items-center justify-center border border-blue-500/20 shadow-lg">
                <i class="fas fa-paper-plane"></i>
            </a>
        </div>

        <div id="content" class="p-5 space-y-4"></div>

        <nav class="fixed bottom-4 left-4 right-4 bg-[#161e2d] border border-slate-800 flex justify-around py-3 rounded-[2rem] shadow-2xl">
            <button onclick="nav('home', this)" class="nav-btn flex flex-col items-center text-gray-500"><i class="fas fa-home"></i><span class="text-[9px] font-bold">Home</span></button>
            <button onclick="nav('task', this)" class="nav-btn flex flex-col items-center text-gray-500"><i class="fas fa-bolt"></i><span class="text-[9px] font-bold">Tasks</span></button>
            <button onclick="nav('wallet', this)" class="nav-btn flex flex-col items-center text-gray-500"><i class="fas fa-wallet"></i><span class="text-[9px] font-bold">Wallet</span></button>
        </nav>
    </div>

    <script>
        let balance = parseFloat(localStorage.getItem('user_bal')) || 0.00;
        let phone = localStorage.getItem('user_id');
        let completedTasks = JSON.parse(localStorage.getItem('tasks_done')) || {};

        if(phone) showApp();

        function login() {
            let p = document.getElementById('userPhone').value;
            if(p.length >= 10) { localStorage.setItem('user_id', p); phone = p; showApp(); }
            else { alert("Enter valid phone!"); }
        }

        function showApp() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('idLabel').innerText = "ID: " + phone;
            nav('task', document.querySelectorAll('.nav-btn')[1]);
            updateUI();
        }

        function nav(page, btn) {
            let c = document.getElementById('content');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
            if(btn) btn.classList.add('active-nav');

            if(page === 'home') {
                c.innerHTML = `
                <div class="bg-gradient-to-r from-green-600 to-teal-700 p-8 rounded-3xl text-center shadow-xl">
                    <h3 class="font-black text-xl mb-2 italic">Support Center</h3>
                    <p class="text-xs mb-6 opacity-80">Payment issues? Message Leohafru1 now.</p>
                    <a href="https://t.me/Leohafru1" class="bg-white text-green-700 px-8 py-3 rounded-2xl font-black text-xs inline-block shadow-lg">CONTACT ADMIN</a>
                </div>`;
            } else if(page === 'task') {
                let taskData = [
                    {n: "Watch Video Ad #1", p: 0.008, i: "play"}, {n: "Play Mini Game #1", p: 0.005, i: "gamepad"},
                    {n: "Watch Video Ad #2", p: 0.008, i: "play"}, {n: "Subscribe Channel", p: 0.006, i: "youtube"},
                    {n: "Watch Video Ad #3", p: 0.008, i: "play"}, {n: "Follow Instagram", p: 0.004, i: "instagram"},
                    {n: "Watch Video Ad #4", p: 0.008, i: "play"}, {n: "Join Telegram", p: 0.005, i: "paper-plane"},
                    {n: "Watch Video Ad #5", p: 0.008, i: "play"}, {n: "TikTok Like", p: 0.004, i: "tiktok"},
                    {n: "Watch Video Ad #6", p: 0.008, i: "play"}, {n: "Play Mini Game #2", p: 0.005, i: "gamepad"},
                    {n: "Watch Video Ad #7", p: 0.008, i: "play"}, {n: "Twitter Follow", p: 0.004, i: "twitter"},
                    {n: "Watch Video Ad #8", p: 0.008, i: "play"}, {n: "Install New App", p: 0.015, i: "download"},
                    {n: "Watch Video Ad #9", p: 0.008, i: "play"}, {n: "Daily Bonus", p: 0.010, i: "gift"}
                ];
                let html = '<h2 class="text-lg font-black text-green-500 mb-4 px-2 tracking-widest uppercase">Earning Tasks (18)</h2>';
                taskData.forEach((t, index) => {
                    let taskId = 'task_' + index;
                    let isDone = isTaskCompleted(taskId);
                    html += `
                    <div onclick="doTask('${taskId}', ${t.p})" class="bg-[#161e2d] p-4 rounded-2xl flex justify-between items-center border border-slate-800 active:scale-95 transition-all cursor-pointer ${isDone ? 'done-task' : ''}">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 bg-[#0b0f1a] rounded-xl flex items-center justify-center text-green-500 shadow-inner"><i class="fas fa-${t.i}"></i></div>
                            <div><p class="font-bold text-sm">${t.n}</p><p class="text-[10px] text-green-500">${isDone ? 'Wait 24h' : 'Reward: $'+t.p}</p></div>
                        </div>
                        <i class="fas ${isDone ? 'fa-check-circle text-green-500' : 'fa-play text-gray-700'}"></i>
                    </div>`;
                });
                c.innerHTML = html;
            } else if(page === 'wallet') {
                c.innerHTML = `
                <div class="bg-[#161e2d] p-8 rounded-[2.5rem] border border-slate-800">
                    <h3 class="text-xl font-black mb-6">Withdraw Money</h3>
                    <div class="space-y-3">
                        <div class="flex items-center gap-3 bg-[#0b0f1a] p-4 rounded-xl border border-slate-800"><i class="fas fa-mobile-alt text-green-500"></i><span class="text-sm font-bold">Telebirr / Mobile</span></div>
                        <div class="flex items-center gap-3 bg-[#0b0f1a] p-4 rounded-xl border border-slate-800"><i class="fas fa-university text-blue-400"></i><span class="text-sm font-bold">CBE / Bank</span></div>
                    </div>
                    <input id="accNo" type="text" placeholder="Account Details (09...)" class="w-full p-4 rounded-xl bg-[#0b0f1a] border border-slate-700 mt-6 outline-none text-green-500 font-bold">
                    <button onclick="withdrawRequest()" class="w-full bg-green-600 py-4 rounded-2xl font-black mt-4 shadow-lg shadow-green-900/20">WITHDRAW NOW</button>
                </div>`;
            }
        }

        function isTaskCompleted(id) {
            if (!completedTasks[id]) return false;
            let lastTime = completedTasks[id];
            let now = new Date().getTime();
            return (now - lastTime) < (24 * 60 * 60 * 1000); // 24 ሰዓት ካላለፈ 'Done' ነው
        }

        function doTask(id, amount) {
            alert("Loading Task... Please wait 30 seconds to earn $" + amount);
            balance += amount;
            completedTasks[id] = new Date().getTime();
            localStorage.setItem('tasks_done', JSON.stringify(completedTasks));
            updateUI();
            nav('task'); // Refresh list
        }

        function withdrawRequest() {
            let acc = document.getElementById('accNo').value;
            if(balance < 0.50) { alert("ዝቅተኛው የክፍያ መጠን $0.50 ነው።"); return; }
            if(acc.length < 10) { alert("እባክዎ ትክክለኛ የባንክ ወይም የቴሌብር ቁጥር ያስገቡ!"); return; }
            
            let msg = `የክፍያ ጥያቄ ከ: ${phone}%0Aአካውንት: ${acc}%0Aመጠን: $${balance.toFixed(3)}`;
            window.location.href = `https://t.me/Leohafru1?text=${msg}`;
            balance = 0; updateUI();
        }

        function updateUI() {
            document.getElementById('balDisplay').innerText = "$" + balance.toFixed(3);
            localStorage.setItem('user_bal', balance);
        }
    </script>
</body>
</html>
