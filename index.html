<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethio Job Pro v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .nav-active { color: #22c55e; border-top: 2px solid #22c55e; }
        .task-card:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-[#0f172a] text-white font-sans selection:bg-green-500">

    <div id="mainApp" class="max-w-md mx-auto min-h-screen pb-24">
        <div class="bg-slate-800/50 backdrop-blur-md sticky top-0 z-10 p-6 border-b border-slate-700">
            <p class="text-gray-400 text-xs uppercase tracking-widest font-bold">የእርስዎ የሒሳብ ቋት</p>
            <h1 id="balance" class="text-5xl font-black text-green-500 mt-1">$0.000</h1>
        </div>

        <div id="contentArea" class="px-5 py-6"></div>

        <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-slate-900 border-t border-slate-800 flex justify-around p-3 shadow-2xl">
            <button onclick="navigate('home')" class="nav-btn flex flex-col items-center gap-1 text-gray-400 transition-all">
                <i class="fas fa-home text-xl"></i><span class="text-[10px]">መነሻ</span>
            </button>
            <button onclick="navigate('withdraw')" class="nav-btn flex flex-col items-center gap-1 text-gray-400 transition-all">
                <i class="fas fa-wallet text-xl"></i><span class="text-[10px]">ወጪ ማድረጊያ</span>
            </button>
            <button onclick="navigate('profile')" class="nav-btn flex flex-col items-center gap-1 text-gray-400 transition-all">
                <i class="fas fa-user-circle text-xl"></i><span class="text-[10px]">መገለጫ</span>
            </button>
        </nav>
    </div>

    <script>
        // ፕሮፌሽናል ዳታ አያያዝ
        let balance = parseFloat(localStorage.getItem('ethio_balance')) || 0.00;
        
        function updateUI() {
            document.getElementById('balance').innerText = `$${balance.toFixed(3)}`;
            localStorage.setItem('ethio_balance', balance);
        }

        function navigate(page) {
            const content = document.getElementById('contentArea');
            // የኔቪጌሽን ቀለም መቀየር
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('text-green-500'));
            
            if(page === 'home') {
                content.innerHTML = `
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2"><i class="fas fa-fire text-orange-500"></i> የዛሬ ምርጥ ስራዎች</h2>
                    <div class="space-y-4">
                        ${renderTask("አዲስ ሙዚቃ ቪዲዮ", 0.005, "YouTube")}
                        ${renderTask("ቲክቶክ ቪዲዮ", 0.005, "TikTok")}
                        <div class="bg-blue-600/20 border border-blue-500/50 p-4 rounded-2xl flex justify-between items-center">
                            <div><p class="font-bold text-sm">ጓደኛ ይጋብዙ (Referral)</p><p class="text-blue-400 text-xs">+$0.05 ያግኙ</p></div>
                            <button onclick="alert('ሊንክ ኮፒ ተደርጓል!')" class="bg-blue-600 px-4 py-2 rounded-xl text-xs font-bold shadow-lg shadow-blue-900/40">ኮፒ አድርግ</button>
                        </div>
                    </div>
                `;
            } else if(page === 'withdraw') {
                content.innerHTML = `
                    <h2 class="text-lg font-bold mb-4 text-green-500">ገንዘብ ማውጫ (Withdraw)</h2>
                    <div class="bg-slate-800 p-5 rounded-2xl border border-slate-700 space-y-4">
                        <p class="text-xs text-red-400 font-bold bg-red-400/10 p-2 rounded-lg italic">ዝቅተኛ የክፍያ መጠን $0.50</p>
                        <select class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 text-sm focus:border-green-500 outline-none">
                            <option>ቴሌብር (Telebirr)</option>
                            <option>አቢሲኒያ ባንክ</option>
                            <option>ንግድ ባንክ (CBE)</option>
                        </select>
                        <input type="tel" placeholder="የስልክ ቁጥር" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 text-sm focus:border-green-500 outline-none">
                        <button onclick="processWithdraw()" class="w-full bg-green-600 hover:bg-green-500 py-4 rounded-xl font-black transition-all shadow-lg shadow-green-900/20">ክፍያ ይጠይቁ</button>
                    </div>
                `;
            }
            updateUI();
        }

        function renderTask(title, pay, type) {
            return `
                <div class="task-card bg-slate-800 p-4 rounded-2xl flex justify-between items-center border border-slate-700 hover:border-slate-500 transition-all cursor-pointer" onclick="completeTask(${pay})">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-slate-700 rounded-full flex items-center justify-center text-green-500">
                            <i class="fas fa-${type === 'YouTube' ? 'play' : 'video'}"></i>
                        </div>
                        <div><p class="font-bold text-sm text-gray-200">${title}</p><p class="text-green-500 text-xs font-mono">+$${pay}</p></div>
                    </div>
                    <i class="fas fa-chevron-right text-gray-600"></i>
                </div>`;
        }

        function completeTask(amount) {
            // እዚህ ጋር ነው ማስታወቂያውን የምናስገባው
            alert("ማስታወቂያውን አይተው ሲጨርሱ ክፍያው ይገባል!");
            balance += amount;
            updateUI();
        }

        function processWithdraw() {
            if(balance < 0.50) {
                alert("ይቅርታ! ገና $0.50 አልሞሉም።");
            } else {
                alert("ጥያቄዎ ተልኳል! በ 24 ሰዓት ውስጥ ይከፈልዎታል።");
            }
        }

        navigate('home');
    </script>
</body>
</html>
