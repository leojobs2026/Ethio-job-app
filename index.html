<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethio Job Pro v4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-app-pub-6423416979717513" crossorigin="anonymous"></script>
</head>
<body class="bg-[#0f172a] text-white font-sans">

    <div id="mainApp" class="max-w-md mx-auto min-h-screen pb-24">
        <div class="bg-slate-800/90 backdrop-blur-md sticky top-0 z-10 p-6 border-b border-slate-700 text-center">
            <p class="text-gray-400 text-xs uppercase font-bold">ያጠራቀሙት ሒሳብ</p>
            <h1 id="balance" class="text-5xl font-black text-green-500 mt-1">$0.000</h1>
        </div>

        <div id="contentArea" class="px-5 py-6"></div>

        <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-slate-900 border-t border-slate-800 flex justify-around p-3 shadow-2xl">
            <button onclick="navigate('home')" class="nav-btn flex flex-col items-center gap-1 text-gray-400">
                <i class="fas fa-home text-xl"></i><span class="text-[10px]">መነሻ</span>
            </button>
            <button onclick="navigate('task')" class="nav-btn flex flex-col items-center gap-1 text-gray-400">
                <i class="fas fa-tasks text-xl"></i><span class="text-[10px]">ስራዎች</span>
            </button>
            <button onclick="navigate('game')" class="nav-btn flex flex-col items-center gap-1 text-gray-400">
                <i class="fas fa-gamepad text-xl"></i><span class="text-[10px]">ጨዋታ</span>
            </button>
            <button onclick="navigate('withdraw')" class="nav-btn flex flex-col items-center gap-1 text-gray-400">
                <i class="fas fa-wallet text-xl"></i><span class="text-[10px]">Wallet</span>
            </button>
        </nav>
    </div>

    <script>
        let balance = parseFloat(localStorage.getItem('ethio_bal')) || 0.00;

        function updateUI() {
            document.getElementById('balance').innerText = `$${balance.toFixed(3)}`;
            localStorage.setItem('ethio_bal', balance);
        }

        function navigate(page) {
            const content = document.getElementById('contentArea');
            // Reset colors
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.replace('text-green-500', 'text-gray-400'));
            
            if(page === 'home') {
                content.innerHTML = `<h2 class="text-xl font-bold mb-4">እንኳን ደህና መጡ!</h2><div class="bg-slate-800 p-4 rounded-xl border border-slate-700 text-sm leading-relaxed">አፕሊኬሽኑን ተጠቅመው ስራዎችን በመስራት እና ቪዲዮዎችን በማየት በየቀኑ ገንዘብ ይሰብስቡ።</div>`;
            } else if(page === 'task') {
                content.innerHTML = `
                    <h2 class="text-lg font-bold mb-4">የዛሬ ምርጥ ስራዎች 🔥</h2>
                    <div class="space-y-4">
                        ${renderTask("አዲስ ሙዚቃ ቪዲዮ", 0.005, "youtube")}
                        ${renderTask("አዝናኝ የቲክቶክ ቪዲዮዎች", 0.005, "video")}
                    </div>`;
            } else if(page === 'game') {
                content.innerHTML = `<div class="text-center mt-20"><i class="fas fa-ghost text-5xl text-slate-700 mb-4"></i><h2 class="text-lg font-bold">ጨዋታዎች በቅርቡ ይጠበቃሉ</h2></div>`;
            } else if(page === 'withdraw') {
                content.innerHTML = `
                    <h2 class="text-lg font-bold mb-4 text-green-500">ገንዘብ ማውጫ (Withdraw)</h2>
                    <div class="bg-slate-800 p-5 rounded-2xl border border-slate-700 space-y-4">
                        <p class="text-red-400 text-xs font-bold uppercase tracking-tighter">ዝቅተኛ የክፍያ መጠን $0.50</p>
                        <select class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 text-sm outline-none">
                            <option>Telebirr</option><option>CBE (ንግድ ባንክ)</option><option>Abyssinia</option>
                        </select>
                        <input type="tel" placeholder="የስልክ ቁጥር" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 outline-none">
                        <button onclick="alert('ሒሳብዎ ለማውጣት በቂ አይደለም!')" class="w-full bg-green-600 hover:bg-green-700 py-4 rounded-xl font-bold transition-all">ክፍያ ይጠይቁ</button>
                    </div>`;
            }
            updateUI();
        }

        function renderTask(title, pay, icon) {
            return `<div onclick="showRewardAd(${pay})" class="bg-slate-800 p-5 rounded-2xl flex justify-between items-center border border-slate-700 active:scale-95 transition-transform cursor-pointer">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-slate-900 rounded-full flex items-center justify-center text-red-500 text-xl shadow-inner">
                        <i class="fas fa-${icon}"></i>
                    </div>
                    <div><p class="font-bold text-sm">${title}</p><p class="text-green-500 text-xs font-bold">+$${pay}</p></div>
                </div>
                <button class="bg-green-600 px-5 py-2 rounded-xl text-xs font-black shadow-lg shadow-green-900/20">ስራ</button>
            </div>`;
        }

        function showRewardAd(amount) {
            // AdMob Rewarded Ad Unit ID: ca-app-pub-6423416979717513/8315667035
            alert("ማስታወቂያው እየተጫነ ነው... ሲጨርሱ ክፍያዎ ይገባል!");
            // ማስታወቂያው ሲያልቅ ክፍያውን እንጨምራለን
            balance += amount;
            updateUI();
        }

        navigate('home');
    </script>
</body>
</html>
